<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Skaner: QR + karta odpowiedzi</title>
<script>
  (function authGuard(){
    try{
      var s = sessionStorage.getItem("ts_session_v1") || localStorage.getItem("ts_session_v1");
      if(!s){ location.replace("index.html"); return; }
      var o = JSON.parse(s);
      if(!o || !o.user){ location.replace("index.html"); }
    }catch(e){ location.replace("index.html"); }
  })();

  // Globalny placeholder — definiowany OD RAZU. Główny skrypt nadpisze go
  // właściwą logiką. Dzięki temu inline onclick zawsze coś robi, nawet
  // jeśli główny skrypt padnie.
  window._tsClickCam = function(){
    alert("KLIK ZAREJESTROWANY (placeholder).\n\nGłówny skrypt jeszcze się nie załadował lub padł.\nAdres: " + location.href + "\nProtokół: " + location.protocol + "\nSecure: " + window.isSecureContext);
  };
</script>
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:16px;color:#111;background:#f3f3f3}
  h1{font-size:20px;margin:0 0 12px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{font:inherit;padding:9px 12px;border:1px solid #bbb;border-radius:12px;background:#f7f7f7;cursor:pointer}
  button.primary{background:#111;color:#fff;border-color:#111}
  button:disabled{opacity:.5;cursor:not-allowed}
  .panel{background:white;border:1px solid #e6e6e6;border-radius:16px;padding:14px;margin:12px 0;max-width:1000px}
  .muted{color:#666;font-size:12px}
  video,canvas{width:100%;max-width:760px;border-radius:14px;border:1px solid #ddd;background:#000;display:block}
  .grid{display:grid;grid-template-columns:1fr;gap:10px}
  pre{white-space:pre-wrap;word-break:break-word;background:#fafafa;border:1px solid #eee;border-radius:12px;padding:10px;font-size:12.5px;max-height:60vh;overflow:auto}
  .ok{color:#0a7a2f;font-weight:700}
  .bad{color:#b00020;font-weight:700}
  .hidden{display:none !important}
  .chip{display:inline-flex;align-items:center;gap:8px;border:1px solid #ddd;border-radius:999px;padding:6px 10px;font-size:12px;color:#333;background:#fafafa}
  input[type="checkbox"]{width:16px;height:16px}
  .summary{font-size:18px;font-weight:700}
  .summary .pct{font-size:24px;color:#0a7a2f}
  .step{display:inline-block;padding:3px 9px;border-radius:999px;background:#eee;font-size:12px;margin-right:8px}
  .step.active{background:#111;color:#fff}
  .step.done{background:#0a7a2f;color:#fff}
  .upload-btn{
    font:inherit;padding:9px 12px;border:1px dashed #888;border-radius:12px;
    background:#fff;cursor:pointer;color:#111
  }
  .upload-btn:disabled{opacity:.5;cursor:not-allowed}
  .warn{
    margin-top:10px;padding:10px 12px;border-radius:10px;
    background:#fff7e6;border:1px solid #ffe0a3;color:#7a4b00;font-size:13px
  }
  .warn.hidden{display:none}
  .diag{font-size:11px;color:#888;margin-top:6px;font-family:ui-monospace,Consolas,monospace}
  .diag b{color:#444}
  .err-banner{
    position:sticky;top:0;z-index:50;
    background:#b00020;color:#fff;padding:10px 14px;border-radius:10px;
    margin:0 0 12px;font-weight:600;display:none
  }
  .err-banner.show{display:block}
  .log-panel{
    background:#0f1117;color:#e8e8e8;font-family:ui-monospace,Consolas,monospace;
    font-size:12px;padding:10px;border-radius:10px;margin-top:8px;
    max-height:160px;overflow:auto;white-space:pre-wrap;word-break:break-word
  }
  .log-panel .l{padding:2px 0}
  .log-panel .err{color:#ff8a8a}
  .log-panel .ok{color:#7fe3a4}
  .log-panel .info{color:#9ec5ff}
</style>
</head>
<body>
<div id="errBanner" class="err-banner" style="max-width:1000px"></div>

<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;max-width:1000px">
  <h1 style="margin:0 0 12px">Skaner kart odpowiedzi</h1>
  <div style="display:flex;gap:8px">
    <a href="index.html" style="font:inherit;padding:8px 12px;border:1px solid #ccc;border-radius:10px;background:#fff;color:#111;text-decoration:none">Menu</a>
    <button id="logoutBtn" type="button" style="background:#fff;color:#9b0020;border-color:#f0c8ce;border-radius:12px;padding:9px 12px;cursor:pointer">Wyloguj</button>
  </div>
</div>

<div class="panel">
  <div class="row" style="margin-bottom:6px">
    <span class="step" id="step1">1. Kamera</span>
    <span class="step" id="step2">2. QR (klucz)</span>
    <span class="step" id="step3">3. Karta ucznia</span>
  </div>
  <div class="row">
    <button id="startCam" class="primary" onclick="window._tsClickCam && window._tsClickCam()">Włącz kamerę</button>
    <button id="scanQR" disabled>Skanuj QR (klucz)</button>
    <button id="scanSheet" disabled>Skanuj kartę ucznia</button>
    <button id="reset">Reset</button>
    <span class="chip"><input id="debug" type="checkbox" /><label for="debug">Debug (podgląd warpu)</label></span>
  </div>
  <div class="row" style="margin-top:8px">
    <span class="muted">Bez kamery? Wgraj zdjęcie:</span>
    <button type="button" class="upload-btn" id="btnUploadQR">Wgraj zdjęcie QR</button>
    <button type="button" class="upload-btn" id="btnUploadSheet" disabled>Wgraj zdjęcie karty</button>
    <input id="fileQR" type="file" accept="image/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" />
    <input id="fileSheet" type="file" accept="image/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" />
  </div>
  <div id="status" style="margin-top:8px;padding:8px 10px;background:#eef3ff;border:1px solid #cdd9f5;border-radius:8px;color:#0a2a6b;font-size:14px;font-weight:500">Gotowy. Włącz kamerę albo wgraj zdjęcie.</div>
  <div id="warnBox" class="warn hidden"></div>
  <div class="diag" id="diagBox"></div>
  <div class="log-panel" id="logBox"></div>

  <div class="grid" style="margin-top:10px">
    <video id="video" playsinline muted></video>
    <canvas id="canvas" class="hidden"></canvas>
    <canvas id="debugCanvas" class="hidden"></canvas>
  </div>
</div>

<div class="panel">
  <div><b>Klucz:</b> <span id="keyState" class="bad">brak</span></div>
  <pre id="keyPreview">(najpierw zeskanuj QR z karty)</pre>
</div>

<div class="panel">
  <div class="summary" id="summary">Wynik pojawi się po skanie karty.</div>
  <pre id="result"></pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>
  // ---------- Globalny log + onerror (widoczne na stronie, bez DevTools) ----------
  function _log(level, ...args){
    try{
      const box = document.getElementById("logBox");
      if(!box) return;
      const t = new Date().toLocaleTimeString();
      const line = document.createElement("div");
      line.className = "l " + level;
      line.textContent = `[${t}] ${level.toUpperCase()}: ` + args.map(a=>{
        if(a instanceof Error) return a.name + ": " + a.message;
        if(typeof a === "object"){ try{ return JSON.stringify(a); }catch(_){ return String(a); } }
        return String(a);
      }).join(" ");
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }catch(_){}
  }
  function logInfo(...a){ console.log(...a); _log("info", ...a); }
  function logOk(...a){ console.log(...a); _log("ok", ...a); }
  function logErr(...a){ console.error(...a); _log("err", ...a); }

  function showErrBanner(text){
    const b = document.getElementById("errBanner");
    if(!b) return;
    b.textContent = text;
    b.classList.add("show");
  }

  window.addEventListener("error", function(e){
    logErr("window.error:", e.message, "at", (e.filename || "") + ":" + (e.lineno || ""));
    showErrBanner("Błąd JS: " + e.message);
  });
  window.addEventListener("unhandledrejection", function(e){
    const reason = e.reason && (e.reason.message || e.reason) || "Unknown";
    logErr("unhandledrejection:", reason);
    showErrBanner("Nieobsłużony błąd: " + reason);
  });

  logInfo("Skrypt startuje. URL=", location.href);

  const LETTERS = ["A","B","C","D","E","F"];

  // MUSI ODPOWIADAĆ generator.html
  const LAYOUT = {
    W: 1200, H: 1700,
    markCenter: 60,
    answerY: 320,
    answerH: 1280,
    colLeftX: 80,
    colRightX: 600,
    bubbleStartX: 100,
    bubblePitch: 60,
    bubbleSize: 38,
    minRowH: 32,
    maxRowH: 70
  };

  function computeRowH(taskCount){
    const maxPerCol = Math.ceil(taskCount/2);
    const h = Math.floor(LAYOUT.answerH / maxPerCol);
    return Math.max(LAYOUT.minRowH, Math.min(LAYOUT.maxRowH, h));
  }

  function bubbleCenter(colX, rowIdx, optIdx, rowH){
    return {
      cx: colX + LAYOUT.bubbleStartX + optIdx * LAYOUT.bubblePitch,
      cy: LAYOUT.answerY + (rowIdx + 0.5) * rowH
    };
  }

  // ---------- DOM ----------
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });

  const dbgCanvas = document.getElementById("debugCanvas");
  const dbgCtx = dbgCanvas.getContext("2d");
  const debugToggle = document.getElementById("debug");

  const statusEl = document.getElementById("status");
  const keyStateEl = document.getElementById("keyState");
  const keyPreviewEl = document.getElementById("keyPreview");
  const summaryEl = document.getElementById("summary");
  const resultEl = document.getElementById("result");

  const btnStart = document.getElementById("startCam");
  const btnQR = document.getElementById("scanQR");
  const btnSheet = document.getElementById("scanSheet");
  const btnReset = document.getElementById("reset");
  const fileQR = document.getElementById("fileQR");
  const fileSheet = document.getElementById("fileSheet");
  const btnUploadQR = document.getElementById("btnUploadQR");
  const btnUploadSheet = document.getElementById("btnUploadSheet");
  const warnBox = document.getElementById("warnBox");
  const diagBox = document.getElementById("diagBox");

  // Diagnostyka kontekstu (widoczna od razu — łatwiej znaleźć przyczynę)
  diagBox.innerHTML =
    `<b>Diagnostyka:</b> protokół=${location.protocol}` +
    ` · isSecureContext=${window.isSecureContext}` +
    ` · mediaDevices=${!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)}` +
    ` · jsQR=${typeof jsQR !== "undefined"}`;
  logInfo("DOM podpięty. Diagnostyka:", diagBox.textContent);

  // KRYTYCZNE: nadpisujemy globalny _tsClickCam właściwą funkcją.
  // Inline onclick na <button> wywołuje window._tsClickCam — to jest
  // niezawodne i nie zależy od tego czy addEventListener się powiódł.
  window._tsClickCam = function(){
    logInfo("==> KLIK: Włącz kamerę (przez inline onclick)");
    try{ startCamera(); }
    catch(e){ logErr("startCamera throw:", e); showErrBanner("Błąd: " + (e.message||e)); }
  };
  // Dla pewności DODATKOWO addEventListener — gdyby coś z onclick zawodziło.
  try{
    btnStart.addEventListener("click", function(){
      logInfo("==> KLIK (addEventListener): Włącz kamerę");
    });
  }catch(_){}
  document.getElementById("logoutBtn").addEventListener("click", ()=>{
    sessionStorage.removeItem("ts_session_v1");
    localStorage.removeItem("ts_session_v1");
    if(window.__ts_stream){
      try{ window.__ts_stream.getTracks().forEach(t => t.stop()); }catch(e){}
    }
    location.replace("index.html");
  });

  const step1 = document.getElementById("step1");
  const step2 = document.getElementById("step2");
  const step3 = document.getElementById("step3");

  let stream = null;
  let spec = null;          // rozszerzony spec po dekodowaniu QR
  let cvReady = false;

  function setStatus(s){ statusEl.textContent = s; }
  function setWarn(html){
    if(!html){ warnBox.classList.add("hidden"); warnBox.innerHTML = ""; return; }
    warnBox.classList.remove("hidden"); warnBox.innerHTML = html;
  }

  // Wykryj kontekst uniemożliwiający kamerę (file://, brak HTTPS itd.)
  function cameraSupported(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
    if(typeof window.isSecureContext === "boolean" && !window.isSecureContext) return false;
    return true;
  }

  if(!cameraSupported()){
    const proto = location.protocol;
    let why = "";
    if(proto === "file:"){
      why = "Strona otwarta z dysku (<code>file://</code>) — przeglądarki blokują kamerę. ";
    } else if(!window.isSecureContext){
      why = "Brak HTTPS lub localhost — przeglądarki blokują kamerę. ";
    } else {
      why = "Ta przeglądarka nie wspiera <code>getUserMedia</code>. ";
    }
    setWarn(why + "Zrób zdjęcie i kliknij <b>Wgraj zdjęcie QR</b>. Aby kamera działała: opublikuj pliki na GitHub Pages albo użyj <code>http://localhost</code>.");
    setStatus("Kamera niedostępna w tym kontekście. Wgraj zdjęcie z dysku.");
  }
  function setStep(active){
    [step1, step2, step3].forEach((el, i)=>{
      el.classList.remove("active","done");
      if(i+1 < active) el.classList.add("done");
      else if(i+1 === active) el.classList.add("active");
    });
  }

  // OpenCV.js
  window.Module = {
    onRuntimeInitialized(){
      cvReady = true;
      setStatus("OpenCV gotowy. Włącz kamerę i zeskanuj QR z karty.");
    }
  };

  // ---------- Kamera ----------
  async function startCamera(){
    logInfo("startCamera() — klik zarejestrowany");
    setStatus("Próbuję włączyć kamerę…");
    if(!cameraSupported()){
      logErr("Kamera niedostępna: protocol=", location.protocol, "secureCtx=", window.isSecureContext, "mediaDevices=", !!navigator.mediaDevices);
      setStatus("KAMERA NIEDOSTĘPNA — patrz czerwony banner u góry strony.");
      const why = location.protocol === "file:"
        ? "Strona otwarta z dysku (file://). Przeglądarki blokują kamerę poza HTTPS/localhost."
        : (!window.isSecureContext
            ? "Brak HTTPS / localhost — przeglądarki blokują kamerę."
            : "Twoja przeglądarka nie wspiera getUserMedia.");
      showErrBanner(why + ' — użyj „Wgraj zdjęcie QR".');
      return;
    }
    try{
      logInfo("Wywołuję getUserMedia…");
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      window.__ts_stream = stream;
      logOk("Strumień kamery uzyskany.");
      video.srcObject = stream;
      await video.play();
      logOk("video.play() OK. videoWidth=", video.videoWidth, "videoHeight=", video.videoHeight);
      btnQR.disabled = false;
      setStep(2);
      setStatus("Kamera działa. Pokaż QR z karty (lub klucza).");
      setWarn("");
    }catch(e){
      logErr("getUserMedia error:", e.name, e.message);
      let msg = e.message || String(e);
      if(e.name === "NotAllowedError" || e.name === "SecurityError"){
        msg = "brak zgody na dostęp do kamery. Sprawdź ikonę kłódki w pasku adresu i zezwól na kamerę.";
      } else if(e.name === "NotFoundError" || e.name === "OverconstrainedError"){
        msg = "nie znaleziono kamery na tym urządzeniu.";
      } else if(e.name === "NotReadableError"){
        msg = "kamera jest zajęta przez inny program (np. inna karta przeglądarki, Skype, Teams).";
      }
      setStatus("Błąd kamery: " + msg);
      showErrBanner("Błąd kamery: " + msg);
      setWarn("Jeśli kamera nie zadziała — zrób zdjęcie i kliknij <b>Wgraj zdjęcie</b>.");
    }
  }

  function snap(){
    const w = video.videoWidth || 1280;
    const h = video.videoHeight || 720;
    canvas.width = w; canvas.height = h;
    ctx.drawImage(video, 0, 0, w, h);
    return ctx.getImageData(0, 0, w, h);
  }

  function loadFileToCanvas(file){
    return new Promise((resolve, reject)=>{
      if(!file) return reject(new Error("Brak pliku."));
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = ()=>{
        // Ogranicz rozmiar do 2400px po dłuższej krawędzi (przyspiesza i zmniejsza pamięć)
        const maxSide = 2400;
        let w = img.naturalWidth, h = img.naturalHeight;
        if(Math.max(w,h) > maxSide){
          const k = maxSide / Math.max(w,h);
          w = Math.round(w*k); h = Math.round(h*k);
        }
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(ctx.getImageData(0, 0, w, h));
      };
      img.onerror = ()=>{
        URL.revokeObjectURL(url);
        reject(new Error("Nie udało się otworzyć obrazu."));
      };
      img.src = url;
    });
  }

  // ---------- QR ----------
  function expandPayload(p){
    if(!p || typeof p !== "object") throw new Error("QR: nieprawidłowy obiekt.");
    if(!Array.isArray(p.t)) throw new Error("QR: brak pola t[].");
    const tasks = p.t.map((entry, i)=>{
      if(!Array.isArray(entry) || entry.length < 2) throw new Error(`QR: zły wpis t[${i}].`);
      const [opts, correctIdx] = entry;
      if(opts === 0) return { nr: i+1, type: "open" };
      const o = Math.max(2, Math.min(6, opts));
      const c = Math.max(0, Math.min(o-1, correctIdx|0));
      return { nr: i+1, type: "closed", options: o, correct: LETTERS[c] };
    });
    return { v: p.v || 2, tasks };
  }

  function tryDecodeQR(img){
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "attemptBoth" });
    if(!code || !code.data) return null;
    return code.data;
  }

  function applyQR(text){
    const obj = JSON.parse(text);
    spec = expandPayload(obj);
    keyStateEl.textContent = "ZAŁADOWANY";
    keyStateEl.className = "ok";
    keyPreviewEl.textContent =
      `Wersja: ${spec.v}\nZadania: ${spec.tasks.length}\n\n` +
      spec.tasks.map(t =>
        t.type === "open"
          ? `${t.nr}. otwarte (Ocenia nauczyciel)`
          : `${t.nr}. A–${LETTERS[t.options-1]}, poprawna: ${t.correct}`
      ).join("\n");
    btnSheet.disabled = false;
    btnUploadSheet.disabled = false;
    setStep(3);
    setStatus("QR wczytany. Teraz pokaż całą kartę ucznia (4 czarne kwadraty w rogach widoczne) lub wgraj jej zdjęcie.");
  }

  async function scanQRLoop(){
    if(!stream){
      setStatus('Kamera nieaktywna. Włącz kamerę albo użyj „Wgraj zdjęcie QR".');
      return;
    }
    setStatus("Szukam QR… trzymaj kod w kadrze.");
    const maxMs = 12000;
    const t0 = performance.now();
    while(performance.now() - t0 < maxMs){
      const img = snap();
      const data = tryDecodeQR(img);
      if(data){
        try{ applyQR(data); }
        catch(e){ setStatus("QR znaleziony, ale nie pasuje: " + (e.message || e)); }
        return;
      }
      await new Promise(r => setTimeout(r, 60));
    }
    setStatus("Nie znaleziono QR. Spróbuj ponownie (lepsze światło / bliżej) lub wgraj zdjęcie.");
  }

  btnQR.addEventListener("click", scanQRLoop);

  // Klik w przycisk uploadu wywołuje ukryty input
  btnUploadQR.addEventListener("click", ()=>{
    logInfo("Klik: Wgraj zdjęcie QR — otwieram okno wyboru pliku");
    fileQR.click();
  });
  btnUploadSheet.addEventListener("click", ()=>{
    if(btnUploadSheet.disabled){ logInfo("Wgraj zdjęcie karty — disabled (najpierw QR)"); return; }
    logInfo("Klik: Wgraj zdjęcie karty");
    fileSheet.click();
  });

  fileQR.addEventListener("change", async (e)=>{
    console.log("[scanner] fileQR change", e.target.files);
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if(!file){ setStatus("Nie wybrano pliku."); return; }
    try{
      setStatus(`Czytam QR ze zdjęcia (${file.name}, ${(file.size/1024).toFixed(0)} kB)…`);
      const img = await loadFileToCanvas(file);
      const data = tryDecodeQR(img);
      if(!data){
        setStatus("Nie znaleziono QR na zdjęciu. Zrób ostrzejsze zdjęcie z bliska, w dobrym świetle.");
        return;
      }
      applyQR(data);
    }catch(err){
      console.error("[scanner] fileQR error", err);
      setStatus("Błąd wczytywania zdjęcia: " + (err.message || err));
    }
  });

  // ---------- Markery rogów ----------
  function findCornerMarkers(srcRGBA){
    const w = srcRGBA.cols, h = srcRGBA.rows;

    const gray = new cv.Mat();
    cv.cvtColor(srcRGBA, gray, cv.COLOR_RGBA2GRAY, 0);

    const blur = new cv.Mat();
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);

    const thr = new cv.Mat();
    // Otsu inwersja (czarne markery -> białe blob-y)
    cv.threshold(blur, thr, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);

    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat();
    cv.findContours(thr, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    const buckets = { tl: [], tr: [], br: [], bl: [] };

    for(let i=0;i<contours.size();i++){
      const cnt = contours.get(i);
      const area = cv.contourArea(cnt);
      // Zakres rozmiaru: marker ~50x50 w canvasie 1200x1700, w fotce większy/mniejszy
      if(area < (w*h) * 0.0003 || area > (w*h) * 0.06){ cnt.delete(); continue; }

      const rect = cv.boundingRect(cnt);
      const ar = rect.width / rect.height;
      if(ar < 0.7 || ar > 1.4){ cnt.delete(); continue; }

      // Gęstość wypełnienia: marker jest pełny w środku
      const density = area / (rect.width * rect.height);
      if(density < 0.65){ cnt.delete(); continue; }

      const cx = rect.x + rect.width/2;
      const cy = rect.y + rect.height/2;
      const nx = cx / w, ny = cy / h;

      let q = null;
      if(nx < 0.45 && ny < 0.45) q = "tl";
      else if(nx > 0.55 && ny < 0.45) q = "tr";
      else if(nx > 0.55 && ny > 0.55) q = "br";
      else if(nx < 0.45 && ny > 0.55) q = "bl";

      if(q){
        buckets[q].push({ cx, cy, area });
      }
      cnt.delete();
    }

    gray.delete(); blur.delete(); thr.delete(); contours.delete(); hierarchy.delete();

    const pick = arr => {
      if(!arr.length) return null;
      arr.sort((a, b) => b.area - a.area);
      return { x: arr[0].cx, y: arr[0].cy };
    };
    const tl = pick(buckets.tl);
    const tr = pick(buckets.tr);
    const br = pick(buckets.br);
    const bl = pick(buckets.bl);

    if(!tl || !tr || !br || !bl){
      const miss = [];
      if(!tl) miss.push("góra-lewo");
      if(!tr) miss.push("góra-prawo");
      if(!br) miss.push("dół-prawo");
      if(!bl) miss.push("dół-lewo");
      throw new Error("Nie wykryto markerów: " + miss.join(", ") + ". Popraw kadr/światło, trzymaj kartkę prostopadle.");
    }
    return [tl, tr, br, bl];
  }

  function warpToCanonical(srcRGBA, corners){
    const L = LAYOUT;
    const dsize = new cv.Size(L.W, L.H);

    const srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
      corners[0].x, corners[0].y,
      corners[1].x, corners[1].y,
      corners[2].x, corners[2].y,
      corners[3].x, corners[3].y
    ]);
    const dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
      L.markCenter, L.markCenter,
      L.W - L.markCenter, L.markCenter,
      L.W - L.markCenter, L.H - L.markCenter,
      L.markCenter, L.H - L.markCenter
    ]);
    const M = cv.getPerspectiveTransform(srcTri, dstTri);
    const out = new cv.Mat();
    cv.warpPerspective(srcRGBA, out, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(255,255,255,255));
    srcTri.delete(); dstTri.delete(); M.delete();
    return out;
  }

  // ---------- OMR ----------
  function preprocessBinary(warpRGBA){
    const gray = new cv.Mat();
    cv.cvtColor(warpRGBA, gray, cv.COLOR_RGBA2GRAY, 0);
    const blur = new cv.Mat();
    cv.GaussianBlur(gray, blur, new cv.Size(3,3), 0);
    // adaptiveThreshold radzi sobie z nierównym oświetleniem
    const thr = new cv.Mat();
    cv.adaptiveThreshold(blur, thr, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 31, 12);
    gray.delete(); blur.delete();
    return thr; // single channel: 255 = ciemne (wypełnione)
  }

  function fillRatio(thr, cx, cy, size){
    // Pomijamy obwódkę kratki (38px) — bierzemy wewnętrzny kwadrat ~60% rozmiaru
    const inner = Math.round(size * 0.55);
    const x = Math.round(cx - inner/2);
    const y = Math.round(cy - inner/2);
    const xx = Math.max(0, Math.min(thr.cols - inner, x));
    const yy = Math.max(0, Math.min(thr.rows - inner, y));
    const roi = thr.roi(new cv.Rect(xx, yy, inner, inner));
    const nz = cv.countNonZero(roi);
    roi.delete();
    return nz / (inner * inner);
  }

  function readAnswers(warped, spec){
    const L = LAYOUT;
    const taskCount = spec.tasks.length;
    const rowH = computeRowH(taskCount);
    const maxPerCol = Math.ceil(taskCount/2);

    const thr = preprocessBinary(warped);
    const answers = [];

    // Najpierw zbieramy wszystkie wartości fillRatio, by oszacować próg
    const allRatios = [];
    const cellInfo = []; // do debug i finalnego decydowania

    for(let i=0;i<taskCount;i++){
      const t = spec.tasks[i];
      if(t.type === "open"){
        cellInfo.push(null);
        continue;
      }
      const isLeft = i < maxPerCol;
      const rowIdx = isLeft ? i : i - maxPerCol;
      const colX = isLeft ? L.colLeftX : L.colRightX;
      const ratios = [];
      const centers = [];
      for(let j=0;j<t.options;j++){
        const {cx, cy} = bubbleCenter(colX, rowIdx, j, rowH);
        const r = fillRatio(thr, cx, cy, L.bubbleSize);
        ratios.push(r);
        centers.push({cx, cy});
        allRatios.push(r);
      }
      cellInfo.push({ ratios, centers, taskIdx: i });
    }

    // Adaptacyjny próg: szukamy progu między „pustymi" a „zamalowanymi"
    // Empiryczny: > 0.30 to zwykle zamalowanie, < 0.15 to puste.
    // Dodatkowo bierzemy 30% wyżej od mediany jako fallback.
    const sorted = allRatios.slice().sort((a,b)=>a-b);
    const median = sorted[Math.floor(sorted.length/2)] || 0;
    const ABS_MIN = 0.28;
    const adaptive = Math.max(ABS_MIN, median + 0.18);
    const ratioThr = Math.min(adaptive, 0.55);

    for(let i=0;i<taskCount;i++){
      const t = spec.tasks[i];
      if(t.type === "open"){
        answers.push({ nr: t.nr, type: "open", marked: null });
        continue;
      }
      const info = cellInfo[i];
      const ratios = info.ratios;
      const filled = ratios.map(r => r > ratioThr);
      const filledCount = filled.filter(Boolean).length;
      let marked = null;
      if(filledCount === 1){
        marked = LETTERS[filled.findIndex(Boolean)];
      } else if(filledCount > 1){
        // Wielokrotne zaznaczenie — niejednoznaczne
        marked = null;
      }
      answers.push({
        nr: t.nr, type: "closed", marked, filledCount,
        ratios: ratios.map(r => +r.toFixed(3)),
        ratioThr: +ratioThr.toFixed(3)
      });
    }

    // Debug: ZAWSZE rysujemy warp + nakładki — checkbox tylko steruje widocznością.
    // Dzięki temu można zaznaczyć Debug DOPIERO po skanie i od razu zobaczyć wynik.
    try{
      dbgCanvas.width = warped.cols;
      dbgCanvas.height = warped.rows;
      cv.imshow(dbgCanvas, warped);

      dbgCtx.lineWidth = 2;
      dbgCtx.font = "14px system-ui";
      dbgCtx.fillStyle = "rgba(0,0,0,0.75)";
      dbgCtx.fillRect(8, 8, 480, 32);
      dbgCtx.fillStyle = "white";
      dbgCtx.fillText(`ratioThr=${ratioThr.toFixed(3)} | mediana=${median.toFixed(3)} | ROZMIAR ${warped.cols}x${warped.rows}`, 16, 30);

      for(let i=0;i<taskCount;i++){
        const info = cellInfo[i];
        if(!info) continue;
        for(let j=0;j<info.ratios.length;j++){
          const r = info.ratios[j];
          const isF = r > ratioThr;
          const {cx, cy} = info.centers[j];
          dbgCtx.strokeStyle = isF ? "rgba(0,200,0,0.95)" : "rgba(220,40,40,0.6)";
          dbgCtx.lineWidth = isF ? 3 : 2;
          dbgCtx.strokeRect(cx - L.bubbleSize/2, cy - L.bubbleSize/2, L.bubbleSize, L.bubbleSize);
          dbgCtx.fillStyle = "rgba(0,0,0,0.65)";
          dbgCtx.fillRect(cx - 18, cy - L.bubbleSize/2 - 16, 36, 14);
          dbgCtx.fillStyle = "white";
          dbgCtx.font = "11px system-ui";
          dbgCtx.fillText(r.toFixed(2), cx - 14, cy - L.bubbleSize/2 - 4);
        }
      }
      // Stan widoczności sterowany przez checkbox
      dbgCanvas.classList.toggle("hidden", !debugToggle.checked);
      window.__ts_lastDebugReady = true;
    }catch(e){
      logErr("debug render error:", e);
    }

    thr.delete();
    return answers;
  }

  function grade(answers, spec){
    let max = 0, got = 0;
    const details = [];
    for(const t of spec.tasks){
      if(t.type === "open"){
        details.push({ nr: t.nr, type: "open" });
        continue;
      }
      max++;
      const a = answers.find(x => x.nr === t.nr);
      const marked = a ? a.marked : null;
      const ok = !!(marked && marked === t.correct);
      if(ok) got++;
      details.push({
        nr: t.nr, type: "closed", ok, marked, correct: t.correct,
        filledCount: a?.filledCount ?? 0,
        ratios: a?.ratios ?? [],
        ratioThr: a?.ratioThr
      });
    }
    const pct = max > 0 ? Math.round((got/max) * 1000) / 10 : 0;
    return { got, max, pct, details };
  }

  // ---------- Skan karty ----------
  function processSheetFromCanvas(){
    if(!spec) throw new Error("Najpierw zeskanuj QR z kluczem.");
    if(!cvReady) throw new Error("OpenCV jeszcze się ładuje, spróbuj za chwilę.");

    const src = cv.imread(canvas);
    let warped = null;
    try{
      const corners = findCornerMarkers(src);
      warped = warpToCanonical(src, corners);
      const answers = readAnswers(warped, spec);
      const score = grade(answers, spec);

      const lines = [];
      for(const d of score.details){
        if(d.type === "open"){
          lines.push(`${d.nr}. Ocenia nauczyciel`);
        } else {
          const tag = d.ok ? "✓" : "✗";
          const fc = d.filledCount === 1 ? "" : ` (zaznaczono kratek: ${d.filledCount})`;
          lines.push(`${tag} ${d.nr}. wybrano: ${d.marked ?? "—"} | poprawna: ${d.correct}${fc}`);
        }
      }
      summaryEl.innerHTML = `Wynik: <span class="pct">${score.pct}%</span> &nbsp; (${score.got}/${score.max} pkt)`;
      resultEl.textContent = lines.join("\n");
      setStatus("Gotowe. Jeśli wyniki są nietrafione: włącz Debug i sprawdź podgląd.");
    } finally {
      src.delete();
      if(warped) warped.delete();
    }
  }

  btnSheet.addEventListener("click", async ()=>{
    try{
      if(!stream) throw new Error('Kamera nieaktywna. Włącz kamerę albo użyj „Wgraj zdjęcie karty".');
      setStatus("Skanuję kartę… trzymaj kartkę prostopadle, w równym świetle.");
      await new Promise(r => setTimeout(r, 120));
      snap();
      processSheetFromCanvas();
    }catch(e){
      setStatus("Błąd OMR: " + (e.message || e));
    }
  });

  fileSheet.addEventListener("change", async (e)=>{
    console.log("[scanner] fileSheet change", e.target.files);
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if(!file){ setStatus("Nie wybrano pliku."); return; }
    try{
      if(!spec) throw new Error("Najpierw zeskanuj/wgraj QR z kluczem.");
      if(!cvReady) throw new Error("OpenCV jeszcze się ładuje, spróbuj za chwilę.");
      setStatus(`Czytam zdjęcie karty (${file.name}, ${(file.size/1024).toFixed(0)} kB)…`);
      await loadFileToCanvas(file);
      processSheetFromCanvas();
    }catch(err){
      console.error("[scanner] fileSheet error", err);
      setStatus("Błąd OMR: " + (err.message || err));
    }
  });

  btnReset.addEventListener("click", ()=>{
    spec = null;
    keyStateEl.textContent = "brak";
    keyStateEl.className = "bad";
    keyPreviewEl.textContent = "(najpierw zeskanuj QR z karty)";
    summaryEl.textContent = "Wynik pojawi się po skanie karty.";
    resultEl.textContent = "";
    btnSheet.disabled = true;
    btnUploadSheet.disabled = true;
    dbgCanvas.classList.add("hidden");
    setStep(stream ? 2 : 1);
    setStatus(stream ? "Reset. Zeskanuj QR ponownie." : "Reset. Włącz kamerę albo wgraj QR z dysku.");
  });

  // Debug toggle — pokazuje/ukrywa ostatni warp
  debugToggle.addEventListener("change", ()=>{
    if(window.__ts_lastDebugReady){
      dbgCanvas.classList.toggle("hidden", !debugToggle.checked);
      logInfo("Debug:", debugToggle.checked ? "pokazany" : "ukryty");
    } else {
      if(debugToggle.checked){
        setStatus("Najpierw zeskanuj kartę — debug pojawi się po skanowaniu.");
      }
    }
  });

  setStep(1);
  logOk("Inicjalizacja zakończona — wszystkie handlery podpięte.");
</script>
